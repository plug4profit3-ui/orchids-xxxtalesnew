    <style>
      :root {
        --primary-background: #050505;
        --text-color: #ffffff;
        --accent-gold: #FFD700;
        --accent-red: #cc0000;
        --subtle-details: #a0a0a0;
        
        --gold-metallic: linear-gradient(135deg, 
          #fffdf0 0%, 
          #FFD700 25%, 
          #f7ca18 50%, 
          #FFD700 75%, 
          #fffdf0 100%
        );
        --glass: rgba(0, 0, 0, 0.82);
      }
      
        html, body {
          height: 100%;
          height: 100dvh;
          width: 100%;
          margin: 0;
          padding: 0;
          background-color: var(--primary-background);
          color: var(--text-color);
          -webkit-tap-highlight-color: transparent;
          overflow: hidden;
          overscroll-behavior: none;
          /* GPU Acceleration for smooth transforms */
          transform: translate3d(0,0,0);
        }

        #root {
          width: 100%;
          height: 100%;
          height: 100dvh;
          display: flex;
          flex-direction: column;
          overflow: hidden;
        }

      .text-shine {
        background: var(--gold-metallic);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shine 2.5s linear infinite;
        filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.6));
        will-change: background-position;
        backface-visibility: hidden;
      }

      @keyframes shine { 
        0% { background-position: 0% center; }
        100% { background-position: 200% center; }
      }

      .btn-premium {
        background: var(--gold-metallic);
        background-size: 200% auto;
        color: #000;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8), 0 0 25px rgba(255, 215, 0, 0.35);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 1px solid rgba(255, 255, 255, 0.4);
        will-change: transform, box-shadow;
      }
      
      .btn-premium:active { transform: scale(0.94); opacity: 0.95; }
      .btn-premium:hover { background-position: right center; box-shadow: 0 0 40px rgba(255, 215, 0, 0.5); }

      .glass-premium {
        background: var(--glass);
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        border: 1.5px solid rgba(255, 215, 0, 0.25);
        box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        /* Force composition layer */
        transform: translateZ(0);
      }

      .bling-border {
        border: 1px solid transparent;
        background-image: linear-gradient(var(--primary-background), var(--primary-background)), var(--gold-metallic);
        background-origin: border-box;
        background-clip: content-box, border-box;
      }

      input, textarea {
        font-size: 16px !important; /* Prevent zoom on iOS */
        font-family: 'Alegreya', serif !important;
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
      .safe-pt { padding-top: env(safe-area-inset-top); }

      .choice-button {
        background-color: rgba(20, 20, 20, 0.9);
        border: 1.5px solid var(--accent-gold);
        color: var(--text-color);
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        will-change: transform;
      }
      .choice-button:hover {
        background-color: var(--accent-gold);
        color: #000;
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(255, 215, 0, 0.4);
      }

      .gold-glow {
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      }

      @keyframes pulse-gold {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.05); }
      }
      .animate-pulse-gold { 
        animation: pulse-gold 2s infinite ease-in-out; 
        will-change: opacity, transform;
      }

      @keyframes character-select-pulse {
        0% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.08); filter: brightness(1.3); }
        100% { transform: scale(1.03); filter: brightness(1.1); }
      }
      .animate-character-select {
        animation: character-select-pulse 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      @keyframes toast-in {
        0% { transform: translateY(-100%) scale(0.9); opacity: 0; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }
      .animate-toast-in {
        animation: toast-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      /* Native scroll feel */
      .scroll-container {
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }
    </style>
